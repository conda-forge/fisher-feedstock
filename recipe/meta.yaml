{% set name = "fisher" %}
{% set version = "0.1.16" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/brentp/fishers_exact_test/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 807d7782433d9f5bb24ba983ded387f2f68afb18e3e27be6709d7540a79fdb11

build:
  number: 0
  script:
    - "{{ PYTHON }} -m pip install . --no-deps --ignore-installed"

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}

  host:
    - python
    - cython
    - numpy
    - pip
    - versioneer
    - setuptools
  run:
    - python
    - numpy

test:
  imports:
    - fisher

about:
  home: http://github.com/brentp/fishers_exact_test
  license_file: LICENSE
  license: BSD-3-Clause
  summary: Simple, fast implementation of Fisher's exact test

extra:
  recipe-maintainers:
    - npavlovikj
    - maxyme
